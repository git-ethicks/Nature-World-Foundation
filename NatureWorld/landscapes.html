<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscapes - Nature World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; }
        .landscape-card { border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .landscape-img { width: 100%; height: 280px; object-fit: cover; transition: 0.5s; filter: brightness(90%); }
        .landscape-img:hover { transform: scale(1.05); filter: brightness(100%); }
        .back-to-home {
            position: fixed; bottom: 30px; right: 30px; background-color: #198754; color: white;
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; text-decoration: none; font-size: 22px;
        }
        .back-to-home:hover { background-color: #146c43; color: white; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-mountain"></i> NatureGallery</a>
        </div>
    </nav>
    <div class="container my-5">
        <h2 class="text-center text-success fw-bold mb-4">Breathtaking Landscapes</h2>
        <div class="row g-4">
            <div class="col-md-6"><div class="landscape-card"><img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800" class="landscape-img" alt="Valley"></div></div>
            <div class="col-md-6"><div class="landscape-card"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800" class="landscape-img" alt="Forest Fog"></div></div>
            <div class="col-md-6"><div class="landscape-card"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" class="landscape-img" alt="Yosemite"></div></div>
            <div class="col-md-6"><div class="landscape-card"><img src="https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?w=800" class="landscape-img" alt="Lake"></div></div>
        </div>
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-auto"><p class="mb-0">© 2025 Nature World Assignment.</p></footer>
    <a href="index.html" class="back-to-home"><i class="fas fa-home"></i></a>
</body>
</html>
