<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Nature World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
        .gallery-img { width: 100%; height: 200px; object-fit: cover; transition: transform 0.3s; border-radius: 5px; }
        .gallery-img:hover { transform: scale(1.05); cursor: pointer; }
        .back-to-home {
            position: fixed; bottom: 25px; right: 25px;
            background-color: #198754; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; font-size: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .back-to-home:hover { background-color: #146c43; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">NatureHome</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                </ul>
            </div>
        </div>

        <div class="row g-3">

            </div>
            <div class="col-md-4 col-sm-6">

                </div>
            </div>
            <div class="col-md-4 col-sm-6">

    <footer class="bg-dark text-white text-center py-3 mt-auto">

</html>
