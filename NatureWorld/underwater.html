    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom, #e0f7fa, #006064); min-height: 100vh; }

        .back-to-home {

        .back-to-home:hover { background-color: #004d40; color: white; }

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-info sticky-top">
        <div class="container"><a class="navbar-brand text-white" href="index.html"><i class="fas fa-fish"></i> NatureGallery</a></div>
    </nav>
    <div class="container my-5">
        <h2 class="text-center text-dark fw-bold mb-4">Life Underwater</h2>
        <div class="row g-4">

            <div class="col-md-4"><div class="water-card"><img src="https://images.unsplash.com/photo-1437622368342-7a3d73a34c8f?w=600" class="water-img" alt="Tortoise"></div></div>
